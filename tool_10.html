<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最大公因数与最小公倍数 - 安安老师教研站</title>
    <style>
        :root {
            --primary: #4FC3F7;       /* A色 蓝 */
            --secondary: #FFF176;     /* B色 黄 */
            --common: #81C784;        /* 公有色 绿 */
            --highlight: #FF5252;     /* 高亮色 红 */
            --bg-color: #F4F7F6;
            --panel-bg: #FFFFFF;
            --text-main: #333333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
            color: var(--text-main);
        }

        /* 左侧控制区 */
        #control-panel {
            width: 30%;
            min-width: 320px;
            background-color: var(--panel-bg);
            margin: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            padding: 30px;
            z-index: 10;
        }

        .header { text-align: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 2px dashed #eee; }
        .header h1 { font-size: 22px; color: #0288D1; letter-spacing: 1px; font-weight: bold; }

        .control-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
        .control-label { font-size: 15px; font-weight: bold; color: var(--text-main); }

        select, input[type="number"] {
            padding: 10px 15px; font-size: 16px; border: 2px solid #E0E0E0; border-radius: 8px; outline: none; font-weight: bold; color: #333;
        }
        select:focus, input[type="number"]:focus { border-color: #0288D1; }
        
        .input-row { display: flex; gap: 15px; }
        .input-row div { flex: 1; display: flex; flex-direction: column; gap: 8px; }

        .btn {
            padding: 14px; font-size: 16px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; transition: all 0.2s; color: white; margin-bottom: 10px;
        }
        .btn-play { background-color: #0288D1; box-shadow: 0 4px 10px rgba(2,136,209,0.3); }
        .btn-play:hover { background-color: #0277BD; transform: translateY(-2px); }
        .btn-play:active { transform: translateY(0); }
        .btn-reset { background-color: #E0E0E0; color: #555; }
        .btn-reset:hover { background-color: #D5D5D5; }

        .result-card {
            margin-top: auto; background: #F9FAFB; border: 1px solid #E5E7EB; border-radius: 12px; padding: 20px; text-align: center;
        }
        .result-title { font-size: 14px; color: #6B7280; margin-bottom: 8px; font-weight: bold; }
        .result-value { font-size: 28px; color: var(--highlight); font-weight: bold; }

        /* 右侧展示区 */
        #display-area {
            flex: 1; background-color: #FFFFFF; margin: 20px 20px 20px 0; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.04); position: relative; display: flex; flex-direction: column; align-items: center; overflow: hidden;
        }

        /* 顶部提示横幅 */
        #status-bar {
            background: rgba(2, 136, 209, 0.1); color: #0288D1; padding: 12px 30px; border-radius: 20px; font-size: 18px; font-weight: bold; margin-top: 30px; min-width: 300px; text-align: center; transition: all 0.3s;
        }

        /* 韦恩图核心区域 */
        .venn-container {
            position: relative; width: 100%; max-width: 800px; aspect-ratio: 8/5; margin-top: auto; margin-bottom: auto;
        }

        .svg-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* 标签 */
        .circle-label { position: absolute; top: 10%; font-size: 20px; font-weight: bold; color: #555; z-index: 2; }
        #label-A { left: 20%; }
        #label-B { right: 20%; }

        /* 完美排版的三个不可见容器 (Flexbox防重叠核心) */
        .zone {
            position: absolute; display: flex; flex-wrap: wrap; justify-content: center; align-content: center; gap: 8px; z-index: 3;
        }
        /* 利用百分比定位，确保完全处于圆的独有区域和交集区域内 */
        #zone-left { left: 12%; top: 25%; width: 20%; height: 50%; }
        #zone-center { left: 40%; top: 25%; width: 20%; height: 50%; }
        #zone-right { left: 68%; top: 25%; width: 20%; height: 50%; }

        /* 数字球 UI */
        .ball {
            width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: bold; color: #333; box-shadow: 0 2px 5px rgba(0,0,0,0.15); transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform: scale(0); opacity: 0;
        }
        .ball.show { transform: scale(1); opacity: 1; }
        
        /* 颜色类 */
        .ball.color-a { background-color: var(--primary); }
        .ball.color-b { background-color: var(--secondary); }
        .ball.color-common { background-color: var(--common); color: white; }
        
        /* 最终找出的“那个朋友” */
        .ball.highlight {
            background-color: var(--highlight) !important; color: white !important; transform: scale(1.3) !important; box-shadow: 0 4px 15px rgba(255,82,82,0.6); border: 2px solid #fff; z-index: 10;
        }

        .watermark { position: absolute; right: 25px; bottom: 20px; font-size: 32px; font-weight: bold; color: rgba(0, 0, 0, 0.05); letter-spacing: 2px; pointer-events: none; user-select: none; z-index: 1; }
    </style>
</head>
<body>

    <div id="control-panel">
        <div class="header">
            <h1>找朋友：因数与倍数</h1>
        </div>

        <div class="control-group">
            <div class="control-label">探究模式：</div>
            <select id="modeSelect" onchange="resetAll()">
                <option value="factor">找公因数 (最大公因数)</option>
                <option value="multiple">找公倍数 (最小公倍数)</option>
            </select>
        </div>

        <div class="control-group">
            <div class="control-label">设置数字：</div>
            <div class="input-row">
                <div>
                    <span style="font-size: 13px; color: #666;">数字 A (蓝)</span>
                    <input type="number" id="numA" value="12" min="2" max="100">
                </div>
                <div>
                    <span style="font-size: 13px; color: #666;">数字 B (黄)</span>
                    <input type="number" id="numB" value="18" min="2" max="100">
                </div>
            </div>
            <span style="font-size: 12px; color: #999; margin-top: 5px;">* 倍数模式建议输入较小数字(如4和6)</span>
        </div>

        <button class="btn btn-play" onclick="playAnimation()">▶ 分步演示动画</button>
        <button class="btn btn-reset" onclick="resetAll()">↻ 重置画板</button>

        <div class="result-card">
            <div class="result-title" id="resultLabel">计算结果</div>
            <div class="result-value" id="resultValue">?</div>
        </div>
    </div>

    <div id="display-area">
        <div id="status-bar">请点击左侧“分步演示”开始探究</div>
        
        <div class="venn-container">
            <div class="circle-label" id="label-A">A 的因数</div>
            <div class="circle-label" id="label-B">B 的因数</div>

            <svg class="svg-bg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid meet">
                <circle cx="300" cy="250" r="180" fill="rgba(79, 195, 247, 0.25)" stroke="#4FC3F7" stroke-width="3" stroke-dasharray="8,4" />
                <circle cx="500" cy="250" r="180" fill="rgba(255, 241, 118, 0.25)" stroke="#FBC02D" stroke-width="3" stroke-dasharray="8,4" />
                <text x="400" y="80" text-anchor="middle" font-size="16" fill="#81C784" font-weight="bold">公有区域 (交集)</text>
            </svg>

            <div class="zone" id="zone-left"></div>
            <div class="zone" id="zone-center"></div>
            <div class="zone" id="zone-right"></div>
        </div>

        <div class="watermark">安安老师</div>
    </div>

    <script>
        // DOM Elements
        const modeSelect = document.getElementById('modeSelect');
        const numAInput = document.getElementById('numA');
        const numBInput = document.getElementById('numB');
        const labelA = document.getElementById('label-A');
        const labelB = document.getElementById('label-B');
        const zoneLeft = document.getElementById('zone-left');
        const zoneCenter = document.getElementById('zone-center');
        const zoneRight = document.getElementById('zone-right');
        const statusBar = document.getElementById('status-bar');
        const resultLabel = document.getElementById('resultLabel');
        const resultValue = document.getElementById('resultValue');

        let isAnimating = false;

        // 数学计算函数
        function getFactors(n) {
            let factors = [];
            for (let i = 1; i <= n; i++) {
                if (n % i === 0) factors.push(i);
            }
            return factors;
        }

        // 获取倍数，为了显示不下，最多获取到最小公倍数之后的两个共同倍数
        function getMultiples(n, limitLCM) {
            let multiples = [];
            // 最多显示 15 个，防止撑爆 UI
            let maxCount = Math.min(15, Math.floor((limitLCM * 2) / n)); 
            if(maxCount < 3) maxCount = 5; // 兜底
            for (let i = 1; i <= maxCount; i++) {
                multiples.push(n * i);
            }
            return multiples;
        }

        function getGCD(a, b) {
            if (!b) return a;
            return getGCD(b, a % b);
        }

        function getLCM(a, b) {
            return (a * b) / getGCD(a, b);
        }

        // 清空画板
        function resetAll() {
            if (isAnimating) return; // 防止动画中断出错
            zoneLeft.innerHTML = '';
            zoneCenter.innerHTML = '';
            zoneRight.innerHTML = '';
            resultValue.innerText = '?';
            
            const mode = modeSelect.value;
            const a = parseInt(numAInput.value) || 0;
            const b = parseInt(numBInput.value) || 0;

            labelA.innerText = `${a} 的${mode === 'factor' ? '因数' : '倍数'}`;
            labelB.innerText = `${b} 的${mode === 'factor' ? '因数' : '倍数'}`;
            resultLabel.innerText = mode === 'factor' ? '最大公因数' : '最小公倍数';
            statusBar.innerText = '请点击左侧“分步演示”开始探究';
            statusBar.style.color = '#0288D1';
            statusBar.style.background = 'rgba(2, 136, 209, 0.1)';
        }

        // 创建小球DOM
        function createBall(number, colorClass) {
            const ball = document.createElement('div');
            ball.className = `ball ${colorClass}`;
            ball.innerText = number;
            // 记录原始值用于后续查找高亮
            ball.dataset.val = number; 
            return ball;
        }

        // 睡眠函数，用于控制动画节奏
        const sleep = ms => new Promise(r => setTimeout(r, ms));

        // 核心动画流程
        async function playAnimation() {
            if (isAnimating) return;
            
            const a = parseInt(numAInput.value);
            const b = parseInt(numBInput.value);
            if (!a || !b || a < 1 || b < 1) {
                alert('请输入大于0的正整数哦！');
                return;
            }

            isAnimating = true;
            resetAll(); // 确保画板干净

            const mode = modeSelect.value;
            let listA = [], listB = [], targetResult = 0;

            if (mode === 'factor') {
                listA = getFactors(a);
                listB = getFactors(b);
                targetResult = getGCD(a, b);
            } else {
                targetResult = getLCM(a, b);
                listA = getMultiples(a, targetResult);
                listB = getMultiples(b, targetResult);
            }

            // 数据分类：A独有，B独有，公有
            const setA = new Set(listA);
            const setB = new Set(listB);
            
            const common = listA.filter(x => setB.has(x));
            const onlyA = listA.filter(x => !setB.has(x));
            const onlyB = listB.filter(x => !setA.has(x));

            // 第一步：展示各自独有的数字
            statusBar.innerText = `第一步：列出 ${a} 和 ${b} 各自的${mode === 'factor' ? '因数' : '倍数'}...`;
            
            // 预先将DOM放入区域内，Flexbox会自动排版好，只是初始透明度为0
            onlyA.forEach(num => zoneLeft.appendChild(createBall(num, 'color-a')));
            onlyB.forEach(num => zoneRight.appendChild(createBall(num, 'color-b')));
            // 共同的数字先放到交集区，但颜色先不用共同色，准备变色
            common.forEach(num => zoneCenter.appendChild(createBall(num, 'color-common')));

            await sleep(500);

            // 让 A 和 B 独有的球弹出来
            Array.from(zoneLeft.children).forEach(ball => ball.classList.add('show'));
            Array.from(zoneRight.children).forEach(ball => ball.classList.add('show'));
            
            await sleep(1500);

            // 第二步：交集出现
            statusBar.innerText = `第二步：把共同的“好朋友”（公${mode === 'factor' ? '因数' : '倍数'}）放到交集区...`;
            statusBar.style.color = '#388E3C';
            statusBar.style.background = 'rgba(56, 142, 60, 0.1)';

            Array.from(zoneCenter.children).forEach(ball => ball.classList.add('show'));

            await sleep(2000);

            // 第三步：高亮目标值
            const titleMsg = mode === 'factor' ? '最大公因数' : '最小公倍数';
            statusBar.innerText = `第三步：在中间的公有区域找到【${titleMsg}】！`;
            statusBar.style.color = '#D32F2F';
            statusBar.style.background = 'rgba(211, 47, 47, 0.1)';

            // 在中心区域找到那个目标球
            const centerBalls = Array.from(zoneCenter.children);
            const targetBall = centerBalls.find(b => parseInt(b.dataset.val) === targetResult);
            
            if (targetBall) {
                targetBall.classList.add('highlight');
            }

            // 更新左侧结果卡片
            resultValue.innerText = targetResult;

            isAnimating = false;
        }

        // 初始绑定输入事件，修改数字时重置画板
        numAInput.addEventListener('input', resetAll);
        numBInput.addEventListener('input', resetAll);

        // 启动初始化
        window.onload = resetAll;
    </script>
</body>
</html>
